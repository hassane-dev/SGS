name: Test Gemini API

on:
  workflow_dispatch:

jobs:
  test-gemini:
    runs-on: ubuntu-latest

    steps:
      - name: Tester Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'PY'
          import os
          import urllib.request
          import urllib.error
          import json
          import time

          api_key = os.environ["GEMINI_API_KEY"]

          url = (
              "https://generativelanguage.googleapis.com/v1beta/models/"
              "gemini-3.5-flash:generateContent"
          )

          data = {
              "contents": [
                  {
                      "parts": [
                          {
                              "text": "Traduis uniquement en anglais : Bonjour"
                          }
                      ]
                  }
              ]
          }

          request_data = json.dumps(data).encode("utf-8")

          for attempt in range(1, 4):
              print(f"Tentative {attempt}/3...")

              request = urllib.request.Request(
                  url,
                  data=request_data,
                  headers={
                      "Content-Type": "application/json",
                      "x-goog-api-key": api_key
                  },
                  method="POST"
              )

              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      result = json.loads(
                          response.read().decode("utf-8")
                      )

                  print("Réponse de Gemini :")
                  print(
                      result["candidates"][0]["content"]["parts"][0]["text"]
                  )
                  break

              except urllib.error.HTTPError as error:
                  print(f"Erreur HTTP {error.code}")

                  if error.code == 503 and attempt < 3:
                      print("Service temporairement indisponible.")
                      print("Nouvelle tentative dans 20 secondes...")
                      time.sleep(20)
                  else:
                      print(error.read().decode("utf-8"))
                      raise
          PY
