name: Translate PO files

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v6

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install google-genai polib

      - name: Traduire les fichiers PO
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'PY'
          import os
          import re
          import time
          import polib
          from google import genai

          SOURCE_FILE = "locale/fr_FR/LC_MESSAGES/messages.po"
          ENGLISH_FILE = "locale/en_US/LC_MESSAGES/messages.po"
          ARABIC_FILE = "locale/ar/LC_MESSAGES/messages.po"

          MODEL = "gemini-3.5-flash"

          client = genai.Client(
              api_key=os.environ["GEMINI_API_KEY"]
          )

          def protect_placeholders(text):
              patterns = [
                  r'%\d*\$?[sdif]',
                  r'%[sdif]',
                  r'\{\{.*?\}\}',
                  r'\{[^{}]+\}',
                  r':[A-Za-z_][A-Za-z0-9_]*',
                  r'<[^>]+>',
              ]

              protected = []
              counter = 0

              def replace(match):
                  nonlocal counter
                  token = f"__PLACEHOLDER_{counter}__"
                  protected.append((token, match.group(0)))
                  counter += 1
                  return token

              for pattern in patterns:
                  text = re.sub(pattern, replace, text)

              return text, protected

          def restore_placeholders(text, protected):
              for token, original in protected:
                  text = text.replace(token, original)

              return text

          def translate(text, target_language):
              protected_text, protected = protect_placeholders(text)

              prompt = f"""
          You are a professional software translator.

          Translate the following French software string into {target_language}.

          STRICT RULES:
          - Return ONLY the translation.
          - Do not add explanations.
          - Do not add quotation marks.
          - Preserve every placeholder exactly.
          - Preserve HTML tags exactly.
          - Preserve variables exactly.
          - Do not translate technical variable names.
          - Keep the meaning appropriate for a school management application.

          French source:
          {protected_text}
          """

              for attempt in range(3):
                  try:
                      response = client.models.generate_content(
                          model=MODEL,
                          contents=prompt
                      )

                      result = response.text.strip()

                      if result:
                          return restore_placeholders(result, protected)

                  except Exception as error:
                      print(
                          f"Erreur Gemini ({target_language}), "
                          f"tentative {attempt + 1}/3: {error}"
                      )

                      if attempt < 2:
                          time.sleep(20)

              raise RuntimeError(
                  f"Impossible de traduire : {text}"
              )

          source = polib.pofile(SOURCE_FILE)
          english = polib.pofile(ENGLISH_FILE)
          arabic = polib.pofile(ARABIC_FILE)

          english_entries = {
              entry.msgid: entry
              for entry in english
              if entry.msgid
          }

          arabic_entries = {
              entry.msgid: entry
              for entry in arabic
              if entry.msgid
          }

          translated_count = 0

          for source_entry in source:

              if not source_entry.msgid:
                  continue

              msgid = source_entry.msgid

              english_entry = english_entries.get(msgid)
              arabic_entry = arabic_entries.get(msgid)

              if english_entry and not english_entry.msgstr:
                  print(f"EN: {msgid}")
                  english_entry.msgstr = translate(
                      msgid,
                      "English"
                  )

              if arabic_entry and not arabic_entry.msgstr:
                  print(f"AR: {msgid}")
                  arabic_entry.msgstr = translate(
                      msgid,
                      "Modern Standard Arabic"
                  )

              translated_count += 1

          english.save(ENGLISH_FILE)
          arabic.save(ARABIC_FILE)

          print(
              f"Entrées examinées : {translated_count}"
          )
          PY

      - name: Créer une Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🌍 Traduction automatique des fichiers PO"
          title: "🌍 Traduction automatique : anglais et arabe"
          body: |
            Cette Pull Request contient des traductions générées automatiquement par Gemini.

            Fichiers concernés :
            - locale/en_US/LC_MESSAGES/messages.po
            - locale/ar/LC_MESSAGES/messages.po

            Une vérification humaine est nécessaire avant fusion.
          branch: translation/automatic-gemini
          delete-branch: true
