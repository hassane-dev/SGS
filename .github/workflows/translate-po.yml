name: Translate PO files

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install google-genai polib

      - name: Traduire les fichiers PO
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'PY'
          import os
          import re
          import time
          import polib
          from google import genai

          SOURCE_FILE = "locale/fr_FR/LC_MESSAGES/messages.po"
          ENGLISH_FILE = "locale/en_US/LC_MESSAGES/messages.po"
          ARABIC_FILE = "locale/ar/LC_MESSAGES/messages.po"

          PRIMARY_MODEL = "gemini-3.1-flash-lite"
          FALLBACK_MODEL = "gemini-3.5-flash"

          client = genai.Client(
              api_key=os.environ["GEMINI_API_KEY"]
          )

          failed_translations = []

          def protect_placeholders(text):
              patterns = [
                  r'%\d*\$?[sdif]',
                  r'%[sdif]',
                  r'\{\{.*?\}\}',
                  r'\{[^{}]+\}',
                  r':[A-Za-z_][A-Za-z0-9_]*',
                  r'<[^>]+>',
              ]

              protected = []
              counter = 0

              def replace(match):
                  nonlocal counter

                  token = f"__PLACEHOLDER_{counter}__"

                  protected.append(
                      (token, match.group(0))
                  )

                  counter += 1

                  return token

              for pattern in patterns:
                  text = re.sub(
                      pattern,
                      replace,
                      text
                  )

              return text, protected

          def restore_placeholders(
              text,
              protected
          ):
              for token, original in protected:
                  text = text.replace(
                      token,
                      original
                  )

              return text

          def translate(
              text,
              target_language
          ):
              protected_text, protected = (
                  protect_placeholders(text)
              )

              prompt = f"""
          You are a professional software translator.

          Translate the following French software interface text into {target_language}.

          Rules:
          - Return ONLY the translation.
          - Do not explain anything.
          - Do not add quotation marks.
          - Preserve placeholders exactly.
          - Preserve HTML tags exactly.
          - Preserve variables exactly.
          - Preserve technical identifiers.
          - Keep the translation natural and appropriate for a school management application.

          French source:
          {protected_text}
          """

              models = [
                  PRIMARY_MODEL,
                  FALLBACK_MODEL
              ]

              for model in models:

                  for attempt in range(1, 4):

                      try:

                          print(
                              f"Modèle: {model} | "
                              f"Tentative: {attempt}/3"
                          )

                          response = (
                              client.models.generate_content(
                                  model=model,
                                  contents=prompt
                              )
                          )

                          if not response.text:
                              raise RuntimeError(
                                  "Réponse vide"
                              )

                          result = (
                              response.text.strip()
                          )

                          return restore_placeholders(
                              result,
                              protected
                          )

                      except Exception as error:

                          print(
                              f"Erreur avec {model}: "
                              f"{error}"
                          )

                          if attempt < 3:

                              time.sleep(
                                  15
                              )

              return None

          source = polib.pofile(
              SOURCE_FILE
          )

          english = polib.pofile(
              ENGLISH_FILE
          )

          arabic = polib.pofile(
              ARABIC_FILE
          )

          english_entries = {
              entry.msgid: entry
              for entry in english
              if entry.msgid
          }

          arabic_entries = {
              entry.msgid: entry
              for entry in arabic
              if entry.msgid
          }

          translated_count = 0

          for source_entry in source:

              msgid = source_entry.msgid

              if not msgid:
                  continue

              english_entry = (
                  english_entries.get(msgid)
              )

              arabic_entry = (
                  arabic_entries.get(msgid)
              )

              if (
                  english_entry
                  and not english_entry.msgstr
              ):

                  print(
                      f"EN: {msgid}"
                  )

                  translation = translate(
                      msgid,
                      "English"
                  )

                  if translation:

                      english_entry.msgstr = (
                          translation
                      )

                      translated_count += 1

                      english.save(
                          ENGLISH_FILE
                      )

                  else:

                      failed_translations.append(
                          f"EN | {msgid}"
                      )

              if (
                  arabic_entry
                  and not arabic_entry.msgstr
              ):

                  print(
                      f"AR: {msgid}"
                  )

                  translation = translate(
                      msgid,
                      "Modern Standard Arabic"
                  )

                  if translation:

                      arabic_entry.msgstr = (
                          translation
                      )

                      translated_count += 1

                      arabic.save(
                          ARABIC_FILE
                      )

                  else:

                      failed_translations.append(
                          f"AR | {msgid}"
                      )

          print("")
          print("===== RÉSUMÉ =====")

          print(
              f"Traductions réussies: "
              f"{translated_count}"
          )

          print(
              f"Traductions échouées: "
              f"{len(failed_translations)}"
          )

          if failed_translations:

              print("")
              print("===== ÉCHECS =====")

              for item in failed_translations:

                  print(item)

          print("")
          print(
              "Les fichiers PO ont été sauvegardés."
          )
          PY

      - name: Créer une Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🌍 Traduction automatique des fichiers PO"
          title: "🌍 Traductions automatiques anglais et arabe"
          body: |
            Traductions générées automatiquement par Gemini.

            Une vérification humaine est nécessaire avant fusion.

          branch: translation/automatic-gemini
          delete-branch: true
