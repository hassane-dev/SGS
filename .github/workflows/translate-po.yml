name: Translate POT to Arabic

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  translate-arabic:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v5

      - name: Installer Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install google-genai polib

      - name: Traduire le fichier POT vers l'arabe
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'PY'
          import os
          import re
          import time
          import polib
          from google import genai

          POT_FILE = "locale/message.pot"
          ARABIC_FILE = "locale/ar/LC_MESSAGES/messages.po"

          PRIMARY_MODEL = "gemini-3.1-flash-lite"
          FALLBACK_MODEL = "gemini-3.5-flash"

          client = genai.Client(
              api_key=os.environ["GEMINI_API_KEY"]
          )

          failed_translations = []

          def protect_placeholders(text):
              patterns = [
                  r'%\d*\$?[sdif]',
                  r'%[sdif]',
                  r'\{\{.*?\}\}',
                  r'\{[^{}]+\}',
                  r':[A-Za-z_][A-Za-z0-9_]*',
                  r'<[^>]+>',
              ]

              protected = []
              counter = 0

              def replace(match):
                  nonlocal counter

                  token = f"__PLACEHOLDER_{counter}__"

                  protected.append(
                      (token, match.group(0))
                  )

                  counter += 1

                  return token

              for pattern in patterns:
                  text = re.sub(
                      pattern,
                      replace,
                      text
                  )

              return text, protected

          def restore_placeholders(
              text,
              protected
          ):
              for token, original in protected:
                  text = text.replace(
                      token,
                      original
                  )

              return text

          def translate_to_arabic(text):

              protected_text, protected = (
                  protect_placeholders(text)
              )

              prompt = f"""
          You are a professional software translator.

          Translate the following French software interface text into Modern Standard Arabic.

          STRICT RULES:
          - Return ONLY the Arabic translation.
          - Do not add explanations.
          - Do not add quotation marks.
          - Preserve every placeholder exactly.
          - Preserve HTML tags exactly.
          - Preserve variables exactly.
          - Do not translate technical identifiers.
          - Use clear and natural Modern Standard Arabic.
          - The application is a school management system.

          French source:
          {protected_text}
          """

              models = [
                  PRIMARY_MODEL,
                  FALLBACK_MODEL
              ]

              for model in models:

                  for attempt in range(1, 4):

                      try:

                          print(
                              f"Modèle: {model} | "
                              f"Tentative: {attempt}/3"
                          )

                          response = (
                              client.models.generate_content(
                                  model=model,
                                  contents=prompt
                              )
                          )

                          if not response.text:
                              raise RuntimeError(
                                  "Réponse vide de Gemini"
                              )

                          result = (
                              response.text.strip()
                          )

                          return restore_placeholders(
                              result,
                              protected
                          )

                      except Exception as error:

                          print(
                              f"Erreur avec {model}: "
                              f"{error}"
                          )

                          if attempt < 3:

                              time.sleep(15)

              return None

          print("Lecture du fichier POT...")

          pot = polib.pofile(
              POT_FILE
          )

          if os.path.exists(ARABIC_FILE):

              print(
                  "Fichier arabe existant détecté."
              )

              arabic = polib.pofile(
                  ARABIC_FILE
              )

          else:

              print(
                  "Création du fichier arabe..."
              )

              arabic = polib.POFile()

              arabic.metadata = (
                  pot.metadata.copy()
              )

              arabic.metadata[
                  "Language"
              ] = "ar"

              arabic.metadata[
                  "Language-Team"
              ] = "Arabic"
              
              arabic.metadata[
                  "Plural-Forms"
              ] = (
                  "nplurals=6; "
                  "plural=n==0 ? 0 : "
                  "n==1 ? 1 : "
                  "n==2 ? 2 : "
                  "n%100>=3 && "
                  "n%100<=10 ? 3 : "
                  "n%100>=11 ? 4 : 5;"
              )

          arabic_entries = {
              entry.msgid: entry
              for entry in arabic
              if entry.msgid
          }

          translated_count = 0

          for pot_entry in pot:

              if not pot_entry.msgid:

                  continue

              msgid = pot_entry.msgid

              arabic_entry = (
                  arabic_entries.get(msgid)
              )

              if arabic_entry is None:

                  arabic_entry = polib.POEntry(
                      msgid=msgid
                  )

                  arabic.append(
                      arabic_entry
                  )

                  arabic_entries[
                      msgid
                  ] = arabic_entry

              if arabic_entry.msgstr:

                  print(
                      f"DÉJÀ TRADUIT: {msgid}"
                  )

                  continue

              print(
                  f"AR: {msgid}"
              )

              translation = (
                  translate_to_arabic(
                      msgid
                  )
              )

              if translation:

                  arabic_entry.msgstr = (
                      translation
                  )

                  translated_count += 1

                  arabic.save(
                      ARABIC_FILE
                  )

              else:

                  failed_translations.append(
                      msgid
                  )

          print("")
          print("==============================")
          print("RÉSUMÉ DE LA TRADUCTION ARABE")
          print("==============================")

          print(
              f"Traductions réussies: "
              f"{translated_count}"
          )

          print(
              f"Traductions échouées: "
              f"{len(failed_translations)}"
          )

          if failed_translations:

              print("")
              print("Entrées échouées:")

              for msgid in failed_translations:

                  print(
                      f"- {msgid}"
                  )

          print("")
          print(
              "Fichier arabe sauvegardé:"
          )

          print(
              ARABIC_FILE
          )
          PY

      - name: Créer une Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "🌍 Traduction automatique du POT vers l'arabe"
          title: "🌍 Traduction française → arabe"
          body: |
            Traduction automatique du fichier message.pot français vers l'arabe avec Gemini.

            Une vérification humaine est nécessaire avant fusion.

          branch: translation/arabic-gemini
          delete-branch: true
